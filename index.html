*{box-sizing:border-box;margin:0;padding:0}

.lesson-shell{position:relative;z-index:2;width:min(1160px,100%);display:grid;grid-template-columns:minmax(320px,460px) minmax(420px,560px);gap:30px;align-items:center;justify-content:center}.lesson-copy{position:relative;display:grid;gap:14px;align-content:center}.lesson-num{position:absolute;left:-8px;top:-18px;font-size:112px;font-weight:800;letter-spacing:-6px;line-height:1;opacity:.08;pointer-events:none;user-select:none}.lesson-copy .badge{width:max-content}.lesson-title{font-size:clamp(34px,4vw,52px);line-height:1.08;font-weight:800;letter-spacing:-1.6px}.lesson-meta{display:flex;gap:10px;flex-wrap:wrap}.lesson-meta span{min-height:34px;padding:0 13px;border-radius:10px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);font-size:12px;color:var(--muted);font-weight:600}.lesson-card{background:rgba(23,28,36,.9);border:1px solid var(--border);border-radius:26px;padding:24px 22px;box-shadow:0 18px 40px rgba(0,0,0,.18)}.lesson-card h3{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}.goal{display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-top:1px solid rgba(255,255,255,.05)}.goal:first-of-type{border-top:none;padding-top:0}.goal:last-of-type{padding-bottom:0}.check{width:26px;height:26px;flex:0 0 26px;border-radius:50%;display:grid;place-items:center;font-size:13px;font-weight:800}.goal p{font-size:15px;line-height:1.5}.goal strong{font-weight:800}
.slide[data-theme="xl"] .badge{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.25);color:var(--xl-l)}.slide[data-theme="xl"] .lesson-title span,.slide[data-theme="xl"] .lesson-num{color:var(--xl-l)}.slide[data-theme="xl"] .check{background:rgba(46,204,113,.14);color:var(--xl-l)}.slide[data-theme="wd"] .badge{background:rgba(74,144,217,.12);border:1px solid rgba(74,144,217,.25);color:var(--wd-l)}.slide[data-theme="wd"] .lesson-title span,.slide[data-theme="wd"] .lesson-num{color:var(--wd-l)}.slide[data-theme="wd"] .check{background:rgba(74,144,217,.14);color:var(--wd-l)}.slide[data-theme="pt"] .badge{background:rgba(255,107,71,.12);border:1px solid rgba(255,107,71,.25);color:var(--pt-l)}.slide[data-theme="pt"] .lesson-title span,.slide[data-theme="pt"] .lesson-num{color:var(--pt-l)}.slide[data-theme="pt"] .check{background:rgba(255,107,71,.14);color:var(--pt-l)}
.lesson-bg{position:absolute;inset:0;pointer-events:none;opacity:.9;overflow:hidden}.lesson-bg::before,.lesson-bg::after{content:"";position:absolute}.lesson-bg.xl::before{width:700px;height:700px;left:-180px;top:50%;transform:translateY(-50%);background:linear-gradient(transparent 96%, rgba(46,204,113,.12) 96%),linear-gradient(90deg, transparent 96%, rgba(46,204,113,.12) 96%);background-size:72px 52px;transform-origin:center;rotate:-24deg;opacity:.35}.lesson-bg.xl::after{width:420px;height:420px;right:-80px;top:50%;transform:translateY(-50%);background:radial-gradient(circle, rgba(46,204,113,.16), transparent 64%)}

.xl-icon::after{content:"";position:absolute;left:14px;right:14px;bottom:14px;height:18px;border-radius:8px;background:linear-gradient(rgba(46,204,113,.45) 0 0) 0 0/100% 3px no-repeat,linear-gradient(rgba(46,204,113,.28) 0 0) 0 7px/82% 3px no-repeat,linear-gradient(rgba(46,204,113,.2) 0 0) 0 14px/64% 3px no-repeat}
.xl-icon.i1{left:8%;top:16%;animation-delay:0s}
.xl-icon.i2{left:18%;bottom:16%;width:64px;height:64px;animation-delay:-2s}
.xl-icon.i3{right:10%;top:18%;animation-delay:-4s}
.xl-icon.i4{right:18%;bottom:18%;width:68px;height:68px;animation-delay:-1s}
@keyframes xlFloat{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-18px) rotate(4deg)}}
.wd-icons,.pt-icons{position:absolute;inset:0;pointer-events:none;z-index:1}
.wd-icon{position:absolute;width:78px;height:92px;border-radius:16px;background:linear-gradient(180deg,rgba(74,144,217,.2),rgba(31,91,168,.08));border:1px solid rgba(74,144,217,.22);box-shadow:0 14px 32px rgba(0,0,0,.18);backdrop-filter:blur(6px);animation:wdFloat 8.5s ease-in-out infinite}
.wd-icon::before{content:"W";position:absolute;left:14px;top:10px;font-size:28px;font-weight:800;color:rgba(255,255,255,.94)}
.wd-icon::after{content:"";position:absolute;left:14px;right:14px;bottom:14px;height:34px;background:linear-gradient(rgba(74,144,217,.4) 0 0) 0 0/100% 3px no-repeat,linear-gradient(rgba(74,144,217,.28) 0 0) 0 10px/86% 3px no-repeat,linear-gradient(rgba(74,144,217,.22) 0 0) 0 20px/94% 3px no-repeat,linear-gradient(rgba(74,144,217,.18) 0 0) 0 30px/68% 3px no-repeat}

.pt-icon::before{content:"P";position:absolute;left:14px;top:10px;font-size:24px;font-weight:800;color:rgba(255,255,255,.94)}
.pt-icon::after{content:"";position:absolute;right:12px;bottom:12px;width:34px;height:22px;border-radius:10px 10px 4px 4px;background:linear-gradient(to top,rgba(255,107,71,.52),rgba(255,107,71,.22));box-shadow:-16px 4px 0 -8px rgba(255,107,71,.34),-30px 8px 0 -10px rgba(255,107,71,.22)}

.congrats-wrap{display:grid;justify-items:center;gap:18px}.trophy{font-size:74px}.congrats-title{font-size:clamp(40px,6vw,72px);font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,var(--xl-l),var(--wd-l),var(--pt-l));-webkit-background-clip:text;color:transparent}.congrats-sub{font-size:18px;color:var(--muted)}.congrats-btn{display:inline-flex;align-items:center;justify-content:center;height:50px;padding:0 28px;border-radius:999px;background:linear-gradient(135deg,var(--xl),var(--wd));font-size:14px;font-weight:800;color:#fff}

function makeSlide(slide,index){const el=document.createElement("section");el.className="slide";if(index===0)el.classList.add("act");if(slide.theme)el.dataset.theme=slide.theme;el.dataset.section=slide.section;const excelIcons=slide.theme==="xl"&&slide.type==="lesson"?`<div class="xl-icons"><div class="xl-icon i1"></div><div class="xl-icon i2"></div><div class="xl-icon i3"></div><div class="xl-icon i4"></div></div>`:"";const wordIcons=slide.theme==="wd"&&slide.type==="lesson"?`<div class="wd-icons"><div class="wd-icon i1"></div><div class="wd-icon i2"></div><div class="wd-icon i3"></div><div class="wd-icon i4"></div></div>`:"";const pptIcons=slide.theme==="pt"&&slide.type==="lesson"?`<div class="pt-icons"><div class="pt-icon i1"></div><div class="pt-icon i2"></div><div class="pt-icon i3"></div><div class="pt-icon i4"></div></div>`:"";const lessonIcons=excelIcons+wordIcons+pptIcons;if(slide.type==="title"){el.innerHTML=`<div class="slide-shell"><div class="title-wrap"><div class="badge">✦ ${slide.badge}</div><h1 class="title-main">${slide.title}</h1><p class="title-sub">${slide.subtitle}</p><div class="apps"><div class="app xl">X</div><div class="app wd">W</div><div class="app pt">P</div></div><div class="stats">${slide.stats.map(s=>`<div class="stat"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join("")}</div></div></div>`}if(slide.type==="outline"){el.innerHTML=`<div class="slide-shell"><div class="outline-wrap"><h2 class="outline-title">📋 ${slide.title}</h2><div class="outline-grid">${slide.columns.map(col=>`<div class="outline-col ${col.theme}"><div class="outline-head">${col.head}</div>${col.items.map((item,i)=>`<div class="outline-item"><b>${i+1}</b><span>${item}</span></div>`).join("")}</div>`).join("")}</div></div></div>`}if(slide.type==="divider"){el.innerHTML=`<div class="slide-shell"><div class="divider-wrap"><div class="divider-label">${slide.label}</div><div class="divider-icon">${slide.icon}</div><h2 class="divider-title">${slide.title}</h2><p class="divider-text">${slide.text}</p><div class="divider-tags">${slide.tags.map(tag=>`<span class="divider-tag">${tag}</span>`).join("")}</div></div></div>`}if(slide.type==="lesson"){el.innerHTML=`<div class="lesson-bg ${slide.theme}">${lessonIcons}</div><div class="slide-shell"><div class="lesson-shell"><div class="lesson-copy"><div class="lesson-num">${slide.number}</div><div class="badge">${slide.badge}</div><h2 class="lesson-title">${slide.title}</h2><div class="lesson-meta">${slide.meta.map(item=>`<span>${item}</span>`).join("")}</div></div><div class="lesson-card"><h3>Dars Maqsadlari</h3>${slide.goals.map(goal=>`<div class="goal"><div class="check">✓</div><p>${goal}</p></div>`).join("")}</div></div></div>`}if(slide.type==="congrats"){el.innerHTML=`<div class="slide-shell"><div class="congrats-wrap"><div class="trophy">🏆</div><h2 class="congrats-title">${slide.title}</h2><p class="congrats-sub">${slide.subtitle}</p><div class="congrats-stats">${slide.stats.map(s=>`<div class="congrats-stat"><div class="n" style="color:${s.c}">${s.n}</div><div class="l">${s.l}</div></div>`).join("")}</div><div class="congrats-btn">🎓 Sertifikat olish vaqti!</div></div></div>`}return el}
const sw=document.getElementById("sw");slidesData.forEach((slide,index)=>sw.appendChild(makeSlide(slide,index)));const slides=[...document.querySelectorAll(".slide")];const total=slides.length;let cur=0;let going=false;const sectionClass=["dtl","dtl","dxl","dxl","dxl","dxl","dxl","dxl","dxl","dxl","dxl","dxl","dxl","dwd","dwd","dwd","dwd","dwd","dpt","dpt","dpt","dtl"];const dotsContainer=document.getElementById("dots");slides.forEach((_,i)=>{const d=document.createElement("button");d.className="dot "+(sectionClass[i]||"dtl");if(i===0)d.classList.add("act");d.addEventListener("click",()=>goTo(i));dotsContainer.appendChild(d)});
function updateUI(){document.getElementById("cn").textContent=cur+1;document.getElementById("tn").textContent=total;document.getElementById("pb").style.width=((cur+1)/total*100)+"%";document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("act",i===cur));document.getElementById("bp").style.opacity=cur===0?".35":"1";document.getElementById("bn").style.opacity=cur===total-1?".35":"1"}
function goTo(idx){if(going||idx<0||idx>=total||idx===cur)return;going=true;cur=idx;slides.forEach((slide,i)=>slide.classList.toggle("act",i===cur));updateUI();setTimeout(()=>{going=false},280)}function next(){goTo(cur+1)}function prev(){goTo(cur-1)}
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="ArrowDown"||e.key===" "){e.preventDefault();next()}if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();prev()}if(e.key==="Home")goTo(0);if(e.key==="End")goTo(total-1);if((e.key==="f"||e.key==="F")&&document.documentElement.requestFullscreen){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}});let touchX=0;document.addEventListener("touchstart",e=>{touchX=e.touches[0].clientX},{passive:true});document.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-touchX;if(Math.abs(dx)>50)dx<0?next():prev()},{passive:true});updateUI();
